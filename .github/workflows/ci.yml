name: SecureNet SOC CI/CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.11"
  JWT_SECRET: "ci-test-secret-that-is-long-enough-for-validation"
  INTERNAL_API_KEY: "ci-internal-key-long-enough-for-validation"

jobs:
  # =================================================================
  # Stage 1: Lint & Security
  # =================================================================
  lint:
    name: "🔍 Lint & Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 bandit safety

      - name: Lint (syntax errors + undefined names)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint (style warnings)
        run: flake8 . --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Security scan (bandit)
        run: bandit -r shared/ gateway/ mobile_gateway/ ml_engine/ llm_analyzer/ -s B101 --severity-level medium -f json -o bandit-report.json || true

      - name: Check dependency vulnerabilities
        run: pip audit --desc || true
        continue-on-error: true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json
          if-no-files-found: ignore

  # =================================================================
  # Stage 2: Unit Tests
  # =================================================================
  test:
    name: "✅ Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx pyyaml

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=shared --cov=gateway --cov=mobile_gateway --cov=ml_engine \
            --cov-report=xml --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

  # =================================================================
  # Stage 3: Config Validation
  # =================================================================
  validate-configs:
    name: "🔧 Validate Configs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet

      - name: Validate Prometheus config
        run: |
          docker run --rm -v $PWD/prometheus:/etc/prometheus:ro \
            prom/prometheus:v2.51.0 promtool check config /etc/prometheus/prometheus.yml || true

      - name: Validate Grafana dashboards (JSON)
        run: |
          for f in grafana/dashboards/*.json; do
            python -m json.tool "$f" > /dev/null || exit 1
            echo "✅ $f"
          done

  # =================================================================
  # Stage 4: Docker Build
  # =================================================================
  docker-build:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images (no push)
        run: |
          docker compose build --parallel
        env:
          DOCKER_BUILDKIT: 1

  # =================================================================
  # Stage 5: Deploy (Manual)
  # =================================================================
  deploy-staging:
    name: "🚀 Deploy to Staging"
    runs-on: ubuntu-latest
    needs: [test, docker-build, validate-configs]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy placeholder
        run: |
          echo "🚀 Ready for deployment to staging environment"
          echo "Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d"
