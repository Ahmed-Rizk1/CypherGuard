# SecureNet SOC — Alertmanager Configuration
#
# Routes alerts from Prometheus to notification channels.
# Configure your Slack webhook or email settings below.

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: critical-alerts
      repeat_interval: 1h

receivers:
  - name: default
    # Fallback receiver — logs to Alertmanager UI (localhost:9093)
    # To enable Slack, uncomment and configure:
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
    #     channel: '#securenet-alerts'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ .CommonAnnotations.summary }}'

  - name: critical-alerts
    # Critical receiver — for immediate response
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
    #     channel: '#securenet-critical'
    #     title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
    #     text: '{{ .CommonAnnotations.description }}'
