name: threateye
description: "CypherGuard — Cybersecurity Monitoring Platform (Demo)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0-162.1.beta

dependencies:
 
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  get_it: ^8.0.2
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  equatable: ^2.0.5
  connectivity_plus: ^6.1.0
  flutter_local_notifications: ^18.0.1
  logger: ^2.4.0
  shared_preferences: ^2.3.3
  dartz: ^0.10.1
  # ── Phase 5: Real-Time ───────────────────────────────────────────────────────
  web_socket_channel: ^3.0.1
  # ── Phase 6: Production Hardening ─────────────────────────────────────────
  crypto: ^3.0.3
  # firebase_core and firebase_messaging removed (Sprint 2).
  # Push notifications are handled exclusively via WebSocketManagerService
  # and flutter_local_notifications.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true