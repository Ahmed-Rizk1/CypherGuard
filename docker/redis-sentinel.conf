# SecureNet SOC — Redis Sentinel Configuration
#
# Provides automatic failover for Redis.
# In production, deploy 3 Sentinel instances across separate hosts.
#
# Usage:
#   docker compose --profile redis-ha up -d
#
# Connection string:
#   REDIS_URL=sentinel://redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379/mymaster

sentinel monitor mymaster redis 6379 2
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 10000
sentinel parallel-syncs mymaster 1

# Auth (uncomment if Redis is password-protected)
# sentinel auth-pass mymaster YOUR_REDIS_PASSWORD
